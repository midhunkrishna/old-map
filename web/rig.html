<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Carta Temporum — diorama rig</title>
<script type="importmap">{ "imports": { "three": "/vendor/three.module.min.js" } }</script>
<style>
  html, body { margin: 0; height: 100%; background: #0c0a07; overflow: hidden; font-family: ui-monospace, Menlo, monospace; }
  #rig-hud {
    position: fixed; left: 10px; top: 10px; z-index: 99; color: #d8ffe0;
    background: rgba(10,14,10,0.66); padding: 8px 11px; border-radius: 5px;
    font-size: 12px; line-height: 1.5; white-space: pre; pointer-events: none;
  }
  #rig-ctl {
    position: fixed; left: 10px; bottom: 10px; z-index: 99; display: flex; gap: 6px; flex-wrap: wrap;
    max-width: 60vw;
  }
  #rig-ctl button {
    font: 11px ui-monospace, Menlo, monospace; color: #efe3c6; background: #2a1d0e;
    border: 1px solid #5c4527; border-radius: 4px; padding: 4px 8px; cursor: pointer;
  }
  #rig-ctl button:hover { background: #3a2a14; }
</style>
</head>
<body>
<div id="rig-hud">booting…</div>
<div id="rig-ctl"></div>

<!-- diorama dependency graph only (no maplibre / app engine / wasm) -->
<script src="/js/models/waterfront.js"></script>
<script src="/js/models/vice.js"></script>
<script src="/js/models/civic.js"></script>
<script src="/js/models/religious.js"></script>
<script src="/js/models/shanties.js"></script>
<script src="/js/models/townhouses.js"></script>
<script src="/js/render/pom.js"></script>
<script src="/js/harbortown.js"></script>
<script src="/js/lodfade.js"></script>
<script src="/js/harbortrees.js"></script>
<script src="/js/harbor3d.js"></script>
<script src="/js/harborshiphd.js"></script>
<script src="/js/harborterrain.js"></script>
<script src="/js/harborbirds.js"></script>
<script src="/js/harborpoi.js"></script>
<script src="/js/harborcanoe.js"></script>
<script src="/js/harborwalker.js"></script>
<script src="/js/harboraudio.js"></script>
<script src="/js/render/lod.js"></script>
<script src="/js/render/engine.js"></script>
<script src="/js/harbordiorama.js"></script>

<script>
'use strict';
// The eight surveyed ports; the rig builds carta straight from /data/harbors/<id>.json,
// reusing the same feature-bucketing harbors.js does (sans the maplibre layers).
const PORTS = ['nassau', 'port-royal', 'tortuga', 'batavia', 'bridgetown', 'cartagena', 'charleston', 'havana'];
const POINT3D = ['church', 'chapel', 'convent', 'meeting', 'building', 'battery', 'gallows', 'tavern',
  'shipwright', 'smithy', 'provisioner', 'counting', 'boarding', 'tent', 'brothel', 'gambling', 'governor', 'prison'];

async function loadCarta(id) {
  const plan = await fetch('/data/harbors/' + id + '.json').then((r) => { if (!r.ok) throw new Error(id); return r.json(); });
  const harborPlans = {}, harborShips = [];
  const structures = { blocks: [], forts: [], points: [], streets: [], greens: [], canals: [], wharves: [], lands: [] };
  harborPlans[id] = plan;
  // land bbox → harborBoxes (POI titles, minimap extent read window.carta.harborBoxes)
  let bw = Infinity, bs = Infinity, be = -Infinity, bn = -Infinity;
  for (const f of plan.features) {
    if (f.properties.kind !== 'land') continue;
    for (const ring of f.geometry.coordinates) for (const pt of ring) {
      if (pt[0] < bw) bw = pt[0]; if (pt[0] > be) be = pt[0];
      if (pt[1] < bs) bs = pt[1]; if (pt[1] > bn) bn = pt[1];
    }
  }
  const title = (plan.properties && plan.properties.title) || id;
  const harborBoxes = bw <= be ? [{ id, title, w: bw, e: be, s: bs, n: bn }] : [];
  for (const f of plan.features) {
    const k = f.properties.kind; f.properties.harbor = id;
    if (k === 'ship') harborShips.push({ lngLat: f.geometry.coordinates, heading: f.properties.heading || 0, type: f.properties.type || 'sloop', harbor: id });
    if (POINT3D.includes(k)) structures.points.push({ kind: k, lngLat: f.geometry.coordinates, harbor: id,
      name: f.properties.name || '', note: f.properties.note || '', year_built: f.properties.year_built || 0,
      year_destroyed: f.properties.year_destroyed || Infinity, guns: f.properties.guns || 0 });
    if (k === 'block') structures.blocks.push(f);
    if (k === 'fort') structures.forts.push(f);
    if (k === 'street') structures.streets.push(f);
    if (k === 'green') structures.greens.push(f);
    if (k === 'canal') structures.canals.push(f);
    if (k === 'wharf') structures.wharves.push(f);
    if (k === 'land') structures.lands.push(f);
  }
  return { harborPlans, harborShips, harborStructures: structures, harborBoxes };
}

const stubMap = { getCenter: () => ({ lng: 0, lat: 0 }), getBearing: () => 0, getZoom: () => 14, on() {}, off() {}, getCanvas: () => ({ width: 800, height: 600 }) };
const bus = { _h: {}, on(e, f) { (this._h[e] = this._h[e] || []).push(f); }, emit(e) { const a = [].slice.call(arguments, 1); (this._h[e] || []).forEach((f) => f.apply(null, a)); } };

const hud = document.getElementById('rig-hud');
const params = new URLSearchParams(location.search);

// camera dolly that works WITH OrbitControls (set position along the current view ray)
function setZoom(frac) {
  const c = window.cartaDiorama && window.cartaDiorama._controls;
  const cam = window.cartaDiorama && window.cartaDiorama._cam;
  if (!c || !cam) return false;
  const d = c.minDistance + (c.maxDistance - c.minDistance) * Math.max(0, Math.min(1, frac));
  const t = c.target, p = cam.position;
  let dx = p.x - t.x, dy = p.y - t.y, dz = p.z - t.z;
  const L = Math.hypot(dx, dy, dz) || 1;
  p.x = t.x + dx / L * d; p.y = t.y + dy / L * d; p.z = t.z + dz / L * d;
  window.__zoom = frac;
  return true;
}
window.__setZoom = setZoom;

// full orbit pose: azimuth/polar degrees, distance fraction, target offset (metres).
// Lets a close, low, wall-facing facade shot be framed for POM validation.
function setOrbit(azDeg, polarDeg, frac, tx, tz, ty) {
  const c = window.cartaDiorama && window.cartaDiorama._controls;
  const cam = window.cartaDiorama && window.cartaDiorama._cam;
  if (!c || !cam) return false;
  const t = c.target;
  if (tx != null) t.x = tx; if (tz != null) t.z = tz; if (ty != null) t.y = ty;
  const d = c.minDistance + (c.maxDistance - c.minDistance) * Math.max(0, Math.min(1, frac));
  const a = azDeg * Math.PI / 180, p = polarDeg * Math.PI / 180;   // polar from vertical
  cam.position.set(t.x + d * Math.sin(p) * Math.sin(a), t.y + d * Math.cos(p), t.z + d * Math.sin(p) * Math.cos(a));
  window.__zoom = frac;
  return true;
}
window.__setOrbit = setOrbit;

// Frame a real building close (within the POM fade) for facade validation: pick a
// prominent structure, project it to world via the diorama frame, and place the
// camera ~22 m out at eye height, orbitable via az.
function frameFacade(azDeg) {
  const dio = window.cartaDiorama;
  const fr = dio && dio._frame; if (!fr) return false;
  const S = (window.carta && window.carta.harborStructures) || {};
  // a town BLOCK footprint near the origin; houses line its perimeter facing the
  // streets, so an edge's OUTWARD normal points straight at a house front. We frame
  // the longest edge head-on (POM fades at grazing angles, so face-on is essential).
  const blocks = [];
  for (const f of (S.blocks || [])) {
    const ring0 = f.geometry.coordinates[0]; if (!ring0 || ring0.length < 4) continue;
    const ring = ring0.map((q) => { const p = fr.project(q[0], q[1]); return [p.x, p.z]; });
    let cx = 0, cz = 0; for (const p of ring) { cx += p[0]; cz += p[1]; } cx /= ring.length; cz /= ring.length;
    blocks.push({ ring, cx, cz, d2: cx * cx + cz * cz });
  }
  if (!blocks.length) return false;
  blocks.sort((a, b) => a.d2 - b.d2);
  const B = blocks[Math.min(blocks.length - 1, (azDeg / 30) | 0)];   // az selects which nearby block
  // longest edge of the chosen block
  let best = null;
  for (let i = 0; i < B.ring.length - 1; i++) {
    const a = B.ring[i], b = B.ring[i + 1];
    const len = Math.hypot(b[0] - a[0], b[1] - a[1]);
    if (!best || len > best.len) best = { a, b, len };
  }
  const mx = (best.a[0] + best.b[0]) / 2, mz = (best.a[1] + best.b[1]) / 2;
  let nx = -(best.b[1] - best.a[1]), nz = (best.b[0] - best.a[0]);    // edge normal
  const nl = Math.hypot(nx, nz) || 1; nx /= nl; nz /= nl;
  if ((mx - B.cx) * nx + (mz - B.cz) * nz < 0) { nx = -nx; nz = -nz; } // point outward
  // edge tangent (along the wall)
  let tx = best.b[0] - best.a[0], tz = best.b[1] - best.a[1];
  const tl = Math.hypot(tx, tz) || 1; tx /= tl; tz /= tl;
  const c = dio._controls, cam = dio._cam;
  c.minDistance = 0.5; c.maxPolarAngle = Math.PI * 0.62;
  const dist = 8;
  // view the wall ~45° off its normal — POM shows displacement at oblique angles
  // (face-on = no lateral shift; grazing = faded out). Blend normal + tangent.
  const ox = (nx * 0.72 + tx * 0.7), oz = (nz * 0.72 + tz * 0.7);
  c.target.set(mx, 3, mz);
  cam.position.set(mx + ox * dist, 3.4, mz + oz * dist);
  window.__facade = { x: Math.round(mx), z: Math.round(mz), az: azDeg, blocks: blocks.length };
  return true;
}
window.__frameFacade = frameFacade;

// Frame the nearest shoreline point low (looking down the beach), where the Phase 4
// fine grid resolves the berm/sand gradient. The fine grid follows the camera, so 30 m
// out covers it.
function frameCoast(azDeg) {
  const dio = window.cartaDiorama; const fr = dio && dio._frame; if (!fr) return false;
  const land = ((window.carta.harborStructures || {}).lands || [])[0]; if (!land) return false;
  const ring = land.geometry.coordinates[0]; if (!ring) return false;
  let best = null;
  for (const q of ring) { const p = fr.project(q[0], q[1]); const d2 = p.x * p.x + p.z * p.z; if (!best || d2 < best.d2) best = { p, d2 }; }
  const p = best.p, c = dio._controls, cam = dio._cam;
  c.minDistance = 0.5; c.maxPolarAngle = Math.PI * 0.62;
  const a = azDeg * Math.PI / 180, dist = 30;
  c.target.set(p.x, 0, p.z);
  cam.position.set(p.x + dist * Math.sin(a), 14, p.z + dist * Math.cos(a));
  window.__facade = { x: Math.round(p.x), z: Math.round(p.z), az: azDeg };
  return true;
}
window.__frameCoast = frameCoast;

function go(port, extra) {
  const q = new URLSearchParams(location.search);
  q.set('port', port); if (extra) for (const k in extra) q.set(k, extra[k]);
  location.search = q.toString();
}

function buildControls() {
  const ctl = document.getElementById('rig-ctl');
  const mk = (label, fn) => { const b = document.createElement('button'); b.textContent = label; b.onclick = fn; ctl.appendChild(b); };
  mk('zoom in', () => setZoom((window.__zoom || 0.5) - 0.12));
  mk('zoom out', () => setZoom((window.__zoom || 0.5) + 0.12));
  mk('close-up', () => setZoom(0.03));
  mk('wide', () => setZoom(0.9));
  mk('tour ⛵', () => { const t = document.querySelector('.dio-tour'); if (t) t.click(); });
  mk('perf', () => go(params.get('port') || 'nassau', { perf: '1' }));
  for (const p of PORTS) mk(p, () => go(p));
  window.addEventListener('keydown', (e) => {
    if (e.key === '=' || e.key === '+') setZoom((window.__zoom || 0.5) - 0.08);
    if (e.key === '-') setZoom((window.__zoom || 0.5) + 0.08);
  });
}

// rAF frame-rate meter (the real on-screen rate; drops under load)
let frames = 0, last = performance.now(), fps = 0;
function meter() {
  frames++;
  const now = performance.now();
  if (now - last >= 500) {
    fps = Math.round(frames * 1000 / (now - last)); frames = 0; last = now;
    window.__fps = fps;
    let line = 'port ' + (params.get('port') || 'nassau') + '   ' + fps + ' fps   zoom ' + ((window.__zoom ?? 0.5).toFixed(2));
    try {
      const perf = window.cartaDiorama && window.cartaDiorama._perf && window.cartaDiorama._perf();
      if (perf) { line += '\n' + perf.calls + ' calls  ' + (perf.triangles / 1000 | 0) + 'k tris  cpu ' + perf.cpuMs.toFixed(2) + 'ms';
        window.__perf = perf; }
    } catch (e) { /* ignore */ }
    hud.textContent = line;
  }
  requestAnimationFrame(meter);
}

(async () => {
  const port = params.get('port') || 'nassau';
  try {
    const data = await loadCarta(port);
    const carta = Object.assign({
      gfx: { tier: 3 }, reducedMotion: { matches: params.has('still') },
      map: stubMap, bus, showCard() {}, hideCard() {},
    }, data);
    window.carta = carta;   // several modules (harborpoi, harborterrain) read the global
    if (params.has('nopom')) window.cartaPOM = null;   // A/B: disable the parallax patch
    if (params.has('pomscale')) window.__POM_SCALE = parseFloat(params.get('pomscale'));   // exaggerate to prove it
    if (params.has('hmres')) window.__cartaHmRes = parseInt(params.get('hmres'), 10);   // A/B the heightmap bake resolution
    if (params.has('treebake')) window.__treeBake = parseInt(params.get('treebake'), 10) ? 1 : 0;   // A/B trees sampling the baked grid
    for (const init of (window.cartaInits || [])) { try { init(carta); } catch (e) { console.error('init', e); } }
    await window.cartaDiorama.open(port);
    buildControls();
    requestAnimationFrame(meter);
    // URL-driven pose for screenshots: settle, then dolly to the requested zoom
    if (params.has('zoom')) setTimeout(() => setZoom(parseFloat(params.get('zoom'))), 400);
    if (params.has('facade')) setTimeout(() => frameFacade(parseFloat(params.get('az') || '35')), 500);
    if (params.has('coast')) setTimeout(() => frameCoast(parseFloat(params.get('az') || '35')), 500);
    if (params.has('tour')) setTimeout(() => { const t = document.querySelector('.dio-tour'); if (t) t.click(); }, 600);
    if (params.has('walkprobe')) setTimeout(() => {
      const d = window.cartaDiorama, fr = d._frame, sampleH = fr.sampleH, R = fr.radius, sea = 0;
      let beach = null, water = null;
      for (let a = 0; a < Math.PI * 2 && !beach; a += Math.PI / 16) {
        const dx = Math.cos(a), dz = Math.sin(a);
        let wasWater = sampleH(R * 0.05 * dx, R * 0.05 * dz) <= sea + 0.1;
        for (let r = R * 0.05; r < R * 1.2; r += R * 0.015) {
          const h = sampleH(r * dx, r * dz);
          if (!water && r > R * 0.4 && h < sea - 1) water = { x: r * dx, z: r * dz, heading: Math.atan2(-dx, -dz) };
          if (wasWater && h > sea + 0.4) {   // a water→land crossing: a beach
            beach = { x: (r - 2) * dx, z: (r - 2) * dz, heading: Math.atan2(-dx, -dz) };  // boat 2 m seaward, facing inland
            break;
          }
          wasWater = h <= sea + 0.1;
        }
      }
      window.__probe = {
        beachFound: !!beach, beachLanded: beach ? !!d._probe(beach.x, beach.z, beach.heading) : false,
        waterFound: !!water, waterLanded: water ? !!d._probe(water.x, water.z, water.heading) : false,
      };
    }, 1500);
    if (params.has('walk')) setTimeout(() => {
      const wx = params.has('wx') ? parseFloat(params.get('wx')) : null;
      const wz = params.has('wz') ? parseFloat(params.get('wz')) : null;
      if (window.cartaDiorama._enterWalk) window.cartaDiorama._enterWalk(wx, wz, undefined, params.has('walkanim'));
      if (params.has('walkembark')) setTimeout(() => {
        window.__walkBefore = window.cartaDiorama._state();
        window.dispatchEvent(new KeyboardEvent('keydown', { key: 'e' }));   // board the canoe
        setTimeout(() => { window.__walkAfter = window.cartaDiorama._state(); }, 1100);  // after the ~0.72 s tween
      }, 500);
    }, 700);
    window.__ready = true;
  } catch (e) {
    hud.textContent = 'rig error: ' + (e && e.message || e);
    console.error(e);
    window.__error = String(e && e.stack || e);
  }
})();
</script>
</body>
</html>
